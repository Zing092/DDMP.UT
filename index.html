<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบบันทึกการปฏิบัติงาน (Real-time Cloud)</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // ลิงก์ Firebase ที่คุณให้มา
  const firebaseConfig = {
    databaseURL: "https://ddpmut-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const logsRef = ref(db, 'worklogs');

  // ฟังก์ชันส่งข้อมูลเข้า Cloud (เรียกใช้โดยระบบเดิม)
  window.apiSaveToCloud = function(newLog) {
    if (newLog) {
      push(logsRef, newLog);
    }
  };

  // ดึงข้อมูล Real-time: เมื่อมีคนบันทึก ข้อมูลจะอัปเดตทุกเครื่องทันที
  onValue(logsRef, (snapshot) => {
    const data = snapshot.val();
    const logs = [];
    for (let id in data) {
      logs.push({ ...data[id], firebaseId: id });
    }
    // อัปเดตข้อมูลในเครื่อง (LocalStorage) และสั่ง Render ใหม่
    localStorage.setItem('logs', JSON.stringify(logs.reverse()));
    if (typeof renderApp === 'function' && PAGE === 'logs') {
      renderApp();
    }
  });
</script>

<style>
/* CSS เดิมจากไฟล์ index_21.html ของคุณ */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap');
:root{
  --navy:#0a1628;--navy2:#112040;--navy3:#1a3060;
  --blue:#1e5bbc;--blue2:#2d7dd2;
  --accent:#f0a500;--accent2:#ffbc2e;
  --red:#e63946;--green:#2a9d8f;--white:#ffffff;
  --gl:linear-gradient(135deg, var(--navy2), var(--navy3));
  --rs:16px;--sh:0 10px 30px rgba(0,0,0,0.15);
}
body { font-family: 'IBM Plex Sans Thai', sans-serif; background-color: #f0f2f5; color: var(--navy); margin: 0; padding-bottom: 80px; }
.main-card { background: white; border-radius: var(--rs); border: none; box-shadow: var(--sh); overflow: hidden; margin-bottom: 20px; }
.header-profile { background: var(--gl); padding: 30px 20px; color: white; border-radius: 0 0 30px 30px; margin-bottom: 25px; }
.nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); z-index: 1000; }
.nav-item { text-align: center; color: #adb5bd; text-decoration: none; font-size: .7rem; font-weight: 600; }
.nav-item.active { color: var(--blue); }
.nav-item i { font-size: 1.3rem; display: block; margin-bottom: 4px; }
.log-card { border-left: 4px solid var(--blue); padding: 15px; background: white; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.btn-primary { background: var(--blue); border: none; border-radius: 10px; padding: 12px; font-weight: 600; width: 100%; color: white; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ===== ส่วนจัดการข้อมูล (ปรับปรุงเพื่อเชื่อม Firebase) =====
const DB = {
  logs: () => JSON.parse(localStorage.getItem('logs') || '[]'),
  setLogs: (d) => {
    // เมื่อมีการบันทึกข้อมูลใหม่ ให้ส่งไป Firebase
    if (typeof window.apiSaveToCloud === 'function' && d.length > 0) {
      window.apiSaveToCloud(d[0]); // ส่งรายการล่าสุด (ที่ถูก reverse มาแล้ว)
    }
  },
  emps: () => JSON.parse(localStorage.getItem('emps') || '[{"id":"001","name":"หัวหน้าสถานี","role":"admin","pw":"1234"}]'),
  setEmps: (d) => localStorage.setItem('emps', JSON.stringify(d))
};

let CU = JSON.parse(sessionStorage.getItem('CU') || 'null');
let PAGE = 'home';

// --- ฟังก์ชันช่วยเหลือ (Helpers) ---
function getEmpName(id){const e=DB.emps().find(x=>x.id===id);return e?e.name:id;}
function typeBadge(t){
  if(!t) return '';
  let color = t.includes('อัคคี') ? 'danger' : 'primary';
  return `<span class="badge bg-${color}">${t}</span>`;
}

// --- ฟังก์ชันหลัก ---
function login(){
  const id=document.getElementById('liId').value;
  const pw=document.getElementById('liPw').value;
  const e=DB.emps().find(x=>x.id===id && x.pw===pw);
  if(e){CU=e;sessionStorage.setItem('CU',JSON.stringify(CU));renderApp();}
  else{alert('ข้อมูลไม่ถูกต้อง');}
}

function saveLog(){
  const type=document.getElementById('lType').value;
  const loc=document.getElementById('lLoc').value;
  const det=document.getElementById('lDet').value;
  if(!type||!loc){alert('กรุณากรอกข้อมูลให้ครบ');return;}
  
  const newLog = {
    id: Date.now(),
    empId: CU.id,
    empName: CU.name,
    type, loc, det,
    date: new Date().toISOString()
  };
  
  // ส่งเข้า Firebase ผ่าน DB.setLogs
  DB.setLogs([newLog]);
  
  alert('บันทึกและส่งข้อมูลเรียลไทม์สำเร็จ!');
  PAGE='logs'; renderApp();
}

// --- ฟังก์ชัน UI ---
function renderApp(){
  const app=document.getElementById('app');
  if(!CU){
    app.innerHTML=`<div class="container py-5"><div class="main-card p-4 text-center mt-5">
      <h3 class="fw-bold mb-4">เข้าสู่ระบบป้องกันภัย</h3>
      <input type="text" id="liId" class="form-control mb-3" placeholder="รหัสพนักงาน">
      <input type="password" id="liPw" class="form-control mb-4" placeholder="รหัสผ่าน">
      <button onclick="login()" class="btn btn-primary">เข้าใช้งาน</button>
    </div></div>`;
    return;
  }
  
  let content = '';
  if(PAGE==='home'){
    content = `
      <div class="header-profile"><h5>ยินดีต้อนรับ, ${CU.name}</h5></div>
      <div class="container">
        <div class="main-card p-4">
          <label class="small fw-bold mb-1">ประเภทงาน</label>
          <select id="lType" class="form-select mb-3">
            <option>ระงับอัคคีภัย</option><option>ช่วยเหลือผู้ประสบภัย</option><option>ตรวจพื้นที่</option>
          </select>
          <label class="small fw-bold mb-1">สถานที่</label>
          <input type="text" id="lLoc" class="form-control mb-3" placeholder="ระบุสถานที่">
          <label class="small fw-bold mb-1">รายละเอียด</label>
          <textarea id="lDet" class="form-control mb-4" rows="3"></textarea>
          <button onclick="saveLog()" class="btn btn-primary">บันทึกข้อมูลเรียลไทม์</button>
        </div>
      </div>`;
  } else {
    const logs = DB.logs();
    content = `<div class="container py-4">
      <h5 class="fw-bold mb-4"><i class="fas fa-broadcast-tower text-primary me-2"></i>ภารกิจล่าสุด (Real-time)</h5>
      ${logs.length === 0 ? '<div class="text-center py-5 text-muted">กำลังรอข้อมูล...</div>' : ''}
      ${logs.map(l=>`<div class="log-card">
        <div class="d-flex justify-content-between mb-2">
          ${typeBadge(l.type)}
          <small class="text-muted">${new Date(l.date).toLocaleTimeString('th-TH')}</small>
        </div>
        <div class="fw-bold">${l.loc}</div>
        <div class="small text-muted">${l.det || '-'}</div>
        <div class="mt-2 text-primary small border-top pt-2">ผู้บันทึก: ${l.empName || getEmpName(l.empId)}</div>
      </div>`).join('')}
    </div>`;
  }

  app.innerHTML = content + `
    <div class="nav-bottom">
      <a href="#" onclick="PAGE='home';renderApp()" class="nav-item ${PAGE==='home'?'active':''}">
        <i class="fas fa-edit"></i>บันทึกเหตุ
      </a>
      <a href="#" onclick="PAGE='logs';renderApp()" class="nav-item ${PAGE==='logs'?'active':''}">
        <i class="fas fa-list-ul"></i>ภารกิจทั้งหมด
      </a>
    </div>`;
}

window.onload = renderApp;
</script>
</body>
</html>
