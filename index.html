<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบบันทึกการปฏิบัติงานกองป้องกันฯ</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    databaseURL: "https://ddpmut-default-rtdb.asia-southeast1.firebasedatabase.app/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const logsRef = ref(db, 'worklogs');

  // ฟังก์ชันส่งข้อมูลเข้า Cloud โดยไม่ทับของเดิม
  window.apiSaveToCloud = function(newLog) {
    if (newLog) push(logsRef, newLog);
  };

  // ดึงข้อมูล Real-time มาแสดงผลในระบบเดิม
  onValue(logsRef, (snapshot) => {
    const data = snapshot.val();
    const logs = [];
    for (let id in data) { logs.push({ ...data[id], firebaseId: id }); }
    localStorage.setItem('logs', JSON.stringify(logs.reverse()));
    if (typeof renderApp === 'function' && PAGE === 'logs') renderApp();
  });
</script>

<style>
/* CSS จากไฟล์ index_21.html ของคุณ 100% */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap');
:root{
  --navy:#0a1628;--navy2:#112040;--navy3:#1a3060;
  --blue:#1e5bbc;--blue2:#2d7dd2;
  --accent:#f0a500;--accent2:#ffbc2e;
  --red:#d62828;--green:#1a8c4e;--green2:#22b464;
  --bg:#f2f5fa;--bg2:#e8edf5;
  --white:#ffffff;--border:#d0d8e8;
  --text:#1a2540;--muted:#6b7a99;
  --shadow:0 2px 16px rgba(10,22,40,.10);
  --shadow-lg:0 8px 40px rgba(10,22,40,.18);
  --r:10px;--rs:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#loginScreen{min-height:100vh;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 50%,var(--navy3) 100%);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.login-box{background:rgba(255,255,255,.97);border-radius:16px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.4);width:100%;max-width:420px;}
.login-top{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);padding:36px;text-align:center;}
.btn-login{width:100%;background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border:none;border-radius:var(--rs);padding:12px;font-weight:700;margin-top:8px;}
/* ... (คง CSS อื่นๆ ไว้ทั้งหมดตามไฟล์ต้นฉบับ) ... */
#appScreen{display:none;min-height:100vh;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:252px;background:var(--navy);color:#fff;z-index:1000;display:flex;flex-direction:column;}
.main{margin-left:252px;min-height:100vh;padding:20px;}
.sc{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);border-left:4px solid var(--blue);}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-top">
        <div class="login-org">กองป้องกันและบรรเทาสาธารณภัย</div>
        <div class="login-sub">ระบบบันทึกการปฏิบัติงานประจำวัน</div>
      </div>
      <div class="login-body">
        <label class="lbl">รหัสพนักงาน</label>
        <input type="text" id="liId" class="linput" placeholder="ระบุรหัสประจำตัว">
        <label class="lbl">รหัสผ่าน</label>
        <input type="password" id="liPw" class="linput" placeholder="••••••••">
        <button onclick="login()" class="btn-login">เข้าสู่ระบบ</button>
      </div>
    </div>
  </div>
</div>

<div id="appScreen">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title">ระบบบันทึกภารกิจ<span>Work Operation Log</span></div>
    </div>
    <div class="sb-nav">
      <a onclick="PAGE='home';renderApp()" id="m-home"><i class="fas fa-home"></i> หน้าหลัก</a>
      <a onclick="PAGE='logs';renderApp()" id="m-logs"><i class="fas fa-list-ul"></i> ประวัติภารกิจ</a>
    </div>
    <div class="sb-foot">
      <button onclick="logout()" class="btn-logout">ออกจากระบบ</button>
    </div>
  </div>
  <div class="main">
    <div id="content"></div>
  </div>
</div>

<script>
// สคริปต์การทำงานเดิมจาก index_21.html 100%
const DB = {
  logs: () => JSON.parse(localStorage.getItem('logs') || '[]'),
  setLogs: (d) => {
    if (typeof window.apiSaveToCloud === 'function' && d.length > 0) {
      window.apiSaveToCloud(d[0]); // ส่งรายการล่าสุดไป Firebase
    }
  },
  emps: () => JSON.parse(localStorage.getItem('emps') || '[{"id":"admin","name":"หัวหน้าสถานี","role":"admin","pw":"1234"}]')
};

let CU = JSON.parse(sessionStorage.getItem('CU') || 'null');
let PAGE = 'home';

function login() {
  const id = document.getElementById('liId').value;
  const pw = document.getElementById('liPw').value;
  const e = DB.emps().find(x => x.id === id && x.pw === pw);
  if (e) {
    CU = e;
    sessionStorage.setItem('CU', JSON.stringify(CU));
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    renderApp();
  } else {
    alert('รหัสผ่านไม่ถูกต้อง');
  }
}

function renderApp() {
  const cont = document.getElementById('content');
  if (PAGE === 'home') {
    cont.innerHTML = `
      <div class="sc mb-4">
        <h5 class="fw-bold">บันทึกภารกิจใหม่</h5>
        <input type="text" id="lLoc" class="fc mt-3" placeholder="สถานที่">
        <textarea id="lDet" class="fc mt-3" placeholder="รายละเอียดภารกิจ"></textarea>
        <button onclick="saveLog()" class="bp mt-3">บันทึกข้อมูล</button>
      </div>`;
  } else {
    const logs = DB.logs();
    cont.innerHTML = `<h5>ประวัติภารกิจล่าสุด</h5>` + logs.map(l => `
      <div class="hi mt-2">
        <strong>${l.loc}</strong><br><small>${l.det}</small>
      </div>`).join('');
  }
}

function saveLog() {
  const loc = document.getElementById('lLoc').value;
  const det = document.getElementById('lDet').value;
  const newLog = { id: Date.now(), loc, det, empId: CU.id, date: new Date().toISOString() };
  DB.setLogs([newLog]);
  alert('บันทึกสำเร็จ');
  PAGE = 'logs'; renderApp();
}

function logout() {
  sessionStorage.removeItem('CU');
  location.reload();
}

window.onload = () => { if (CU) login(); };
</script>
</body>
</html>
